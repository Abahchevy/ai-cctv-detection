# Zone-specific PPE requirements
# Each zone lists the PPE items that MUST be worn by every detected person.
# Violations are raised when a required item is absent.

zones:
  zone-entry:
    name: "General Entry / Site Boundary"
    required_ppe:
      - hard_hat
    alert_cooldown_seconds: 30

  zone-welding:
    name: "Welding Bay"
    required_ppe:
      - hard_hat
    alert_cooldown_seconds: 15

  zone-chemical:
    name: "Chemical Storage / Handling"
    required_ppe:
      - hard_hat
    alert_cooldown_seconds: 15

# keremberke/yolov8m-hard-hat-detection class names:
#   helmet = person wearing hard hat  -> maps to hard_hat (PPE present)
#   head   = person with bare head    -> unmapped (absence of helmet = violation)
#   person = full-body person bounding box
class_map:
  "helmet": hard_hat
  "hard hat": hard_hat
  "hardhat": hard_hat
  "person": person
